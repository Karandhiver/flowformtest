<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForm | Full Data Capture</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #111; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #333; }
        h2 { margin: 0 0 20px 0; font-weight: 700; color: #fff; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: 800; }
        input, textarea { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        input:focus { border-color: #007AFF; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #007AFF; color: #fff; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 13px; line-height: 1.5; padding: 15px; border-radius: 10px; display: none; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>FlowForm Collector</h2>
    <form id="main-form">
        <div class="group">
            <label>User Email</label>
            <input type="email" name="email" placeholder="owner@safarx.in" required>
        </div>

        <div class="group">
            <label>Capture Media (Image & Video)</label>
            <div class="grid">
                <input type="file" name="photo_upload" accept="image/*">
                <input type="file" name="video_upload" accept="video/*">
            </div>
        </div>

        <div class="group">
            <label>Message / Notes</label>
            <textarea name="user_message" rows="4" placeholder="Describe the issue..."></textarea>
        </div>

        <input type="hidden" name="form_version" value="2.0.1-SafarX">

        <button type="submit" id="submit-btn">Execute API Test</button>
    </form>
    <div id="status"></div>
</div>

<script>
// --- 1. THE FLOWFORM TRACKING ENGINE ---
window.FlowForm = {
    endpoint: "https://firestore.googleapis.com/v1/projects/safarxin2026/databases/(default)/documents/artifacts/flowform-saas/users/SqwjNP27pxVdf1KR3va4alzGJb42/projects/oJY9X5KSS5ku74zJ4EDe/forms/yM6u01MYnQPd8dUI1Nug/submissions",
    
    // Resolves the "Nested Error" by mapping every JS type to a Firestore Value Type
    _format: function(data) {
        if (data === null || data === undefined) return { nullValue: null };
        if (typeof data === 'boolean') return { booleanValue: data };
        if (typeof data === 'number') return Number.isInteger(data) ? { integerValue: data.toString() } : { doubleValue: data };
        if (typeof data === 'string') return { stringValue: data };
        if (Array.isArray(data)) return { arrayValue: { values: data.map(v => this._format(v)) } };
        if (typeof data === 'object') {
            const fields = {};
            for (const key in data) {
                // Skip empty keys
                if (data[key] !== undefined) fields[key] = this._format(data[key]);
            }
            return { mapValue: { fields } };
        }
        return { stringValue: String(data) };
    },

    track: async function(customData) {
        try {
            // Root fields structure
            const rootFields = { 
                createdAt: { stringValue: new Date().toISOString() }, 
                userAgent: { stringValue: navigator.userAgent },
                submission_id: { stringValue: 'FF-' + Math.random().toString(36).substr(2, 9).toUpperCase() }
            };
            
            // Map the rest of your custom data using the _format logic
            for (const key in customData) {
                rootFields[key] = this._format(customData[key]);
            }

            const res = await fetch(this.endpoint, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ fields: rootFields }) 
            });
            
            const result = await res.json();
            if(!res.ok) throw new Error(result.error?.message || "Firestore Rejected Data");
            
            return result;
        } catch(e) { 
            console.error("Critical FlowForm Error:", e); 
            throw e;
        }
    }
};

// --- 2. AUTOMATIC LOCATION & FILE HANDLING ---
const toBase64 = f => new Promise((res, rej) => {
    const r = new FileReader();
    r.readAsDataURL(f);
    r.onload = () => res(r.result);
    r.onerror = e => rej(e);
});

let currentLoc = { lat: "Not Available", lng: "Not Available" };
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
        currentLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
    });
}

// --- 3. SUBMISSION LOGIC ---
document.getElementById('main-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status');
    const form = e.target;
    
    btn.disabled = true;
    btn.innerText = "SCRAPING & UPLOADING...";

    try {
        const formData = new FormData(form);
        const finalData = {};

        // A. Automatically collect all standard inputs
        for (let [key, value] of formData.entries()) {
            if (!(value instanceof File)) {
                finalData[key] = value;
            }
        }

        // B. Add the Location Object (Nested Test)
        finalData.geo_location = currentLoc;

        // C. Process Media Files
        const files = form.querySelectorAll('input[type="file"]');
        finalData.attachments = {};
        
        for (const input of files) {
            const file = input.files[0];
            if (file) {
                finalData.attachments[input.name] = await toBase64(file);
            }
        }

        // D. EXECUTE TRACKING (The payload is formatted inside the .track method)
        const response = await FlowForm.track(finalData);

        status.style.display = "block";
        status.style.background = "#065f46";
        status.style.color = "#a7f3d0";
        status.innerHTML = `<strong>SUCCESS!</strong><br>Document Created: ${response.name.split('/').pop()}`;
        form.reset();

    } catch (err) {
        status.style.display = "block";
        status.style.background = "#7f1d1d";
        status.style.color = "#fecaca";
        status.innerHTML = `<strong>NESTED ERROR SOLVED, BUT API REJECTED:</strong><br>${err.message}`;
    } finally {
        btn.disabled = false;
        btn.innerText = "Execute API Test";
    }
});
</script>

</body>
</html>
