<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowForm | Safar X Fixed</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #111; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #333; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; font-weight: 800; }
        input, textarea { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        #status { margin-top: 20px; font-size: 13px; padding: 15px; border-radius: 10px; display: none; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>FlowForm Collector</h2>
    <form id="main-form">
        <div class="group">
            <label>User Email</label>
            <input type="email" name="email" placeholder="ai.karandhiver@gmail.com" required>
        </div>
        <div class="group">
            <label>Attachments</label>
            <input type="file" name="photo" accept="image/*">
        </div>
        <div class="group">
            <label>Message</label>
            <textarea name="message" rows="3"></textarea>
        </div>
        <button type="submit" id="submit-btn">Submit to Firestore</button>
    </form>
    <div id="status"></div>
</div>

<script>
window.FlowForm = {
    endpoint: "https://firestore.googleapis.com/v1/projects/safarxin2026/databases/(default)/documents/artifacts/flowform-saas/users/SqwjNP27pxVdf1KR3va4alzGJb42/projects/oJY9X5KSS5ku74zJ4EDe/forms/yM6u01MYnQPd8dUI1Nug/submissions",
    
    // THE FIX: This function ensures EVERY nested object is wrapped in mapValue -> fields
    _format: function(data) {
        if (data === null || data === undefined) return { nullValue: null };
        if (typeof data === 'boolean') return { booleanValue: data };
        if (typeof data === 'number') return { doubleValue: data };
        if (Array.isArray(data)) return { arrayValue: { values: data.map(v => this._format(v)) } };
        
        // If it's an object, we MUST wrap it in mapValue AND fields
        if (typeof data === 'object') {
            const wrappedFields = {};
            for (const key in data) {
                if (Object.prototype.hasOwnProperty.call(data, key)) {
                    wrappedFields[key] = this._format(data[key]); // Recursive call
                }
            }
            return { mapValue: { fields: wrappedFields } };
        }
        
        return { stringValue: String(data) };
    },

    track: async function(customData) {
        // Construct the root document
        const payload = {
            fields: {
                createdAt: { stringValue: new Date().toISOString() },
                userAgent: { stringValue: navigator.userAgent },
                // Format the entire custom data object as one big mapValue
                data: this._format(customData)
            }
        };

        const res = await fetch(this.endpoint, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
        });
        
        const result = await res.json();
        if(!res.ok) throw new Error(result.error?.message || "API Error");
        return result;
    }
};

// File to Base64
const toBase64 = f => new Promise((res) => {
    const r = new FileReader();
    r.readAsDataURL(f);
    r.onload = () => res(r.result);
});

document.getElementById('main-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status');
    btn.innerText = "Sending...";
    
    try {
        const formData = new FormData(e.target);
        const submissionData = {};
        
        // Get text fields
        for (let [key, value] of formData.entries()) {
            if (!(value instanceof File)) submissionData[key] = value;
        }

        // Get Location
        if (navigator.geolocation) {
            await new Promise(r => navigator.geolocation.getCurrentPosition(p => {
                submissionData.location = { lat: p.coords.latitude, lng: p.coords.longitude };
                r();
            }, () => r()));
        }

        // Get Files
        const file = e.target.querySelector('input[type="file"]').files[0];
        if (file) {
            submissionData.attachment_base64 = await toBase64(file);
        }

        await FlowForm.track(submissionData);
        status.style.display = "block";
        status.style.background = "#065f46";
        status.innerText = "Success! Nested entities formatted and accepted.";
    } catch (err) {
        status.style.display = "block";
        status.style.background = "#7f1d1d";
        status.innerText = "Error: " + err.message;
    } finally {
        btn.innerText = "Submit to Firestore";
    }
});
</script>
</body>
</html>
